services:
  html2pdf:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CONCURRENCY=3
      - TIMEOUT=30000
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
